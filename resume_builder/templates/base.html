<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ResumeAI{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0B0F19',
                        cardbg: 'rgba(255, 255, 255, 0.05)',
                        cardborder: 'rgba(255, 255, 255, 0.1)',
                        primary: '#6366F1',
                        secondary: '#8B5CF6',
                        textPrimary: '#E5E7EB',
                        textSecondary: '#9CA3AF',
                        success: '#22C55E',
                        warning: '#F59E0B',
                        error: '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: #E5E7EB;
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: border-color 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
        }
        .glass-nav {
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* Form inputs global */
        input[type="text"], input[type="email"], input[type="url"], input[type="number"], input[type="file"], textarea, select {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #F3F4F6;
            border-radius: 0.5rem;
            padding: 0.625rem 0.875rem; /* Consistent, sleek height */
            font-size: 0.95rem; /* Clean professional size */
            width: 100%;
            transition: all 0.2s ease-in-out;
            font-family: 'Inter', sans-serif;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            padding: 0.4rem;
            color: #9CA3AF;
        }
        input[type="file"]::file-selector-button {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #818CF8;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            margin-right: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        input[type="file"]::file-selector-button:hover {
            background: rgba(99, 102, 241, 0.2);
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6366F1;
            background-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        input::placeholder, textarea::placeholder {
            color: #6B7280;
            font-size: 0.9rem;
        }
        
        /* Clean labels */
        .form-row { margin-bottom: 1.25rem; }
        .form-row label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #9CA3AF; 
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Checkbox styling */
        input[type="checkbox"] {
            width: 1.1rem;
            height: 1.1rem;
            border-radius: 0.25rem;
            background-color: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            accent-color: #6366F1;
        }

        /* Consistent Add/Remove Buttons */
        button[onclick^="addForm"] {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.75rem;
            background: rgba(99, 102, 241, 0.05);
            border: 1px dashed rgba(99, 102, 241, 0.3);
            border-radius: 0.5rem;
            color: #818CF8;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-top: 1rem;
            cursor: pointer;
        }
        button[onclick^="addForm"]:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.5);
            color: #A5B4FC;
            transform: translateY(-1px);
        }
        
        button[onclick="removeForm(this)"] {
            background: rgba(239, 68, 68, 0.1);
            color: #FCA5A5;
            padding: 0.25rem 0.6rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            z-index: 10;
        }
        button[onclick="removeForm(this)"]:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        /* Sub-section cards (Education, Projects, etc) */
        .formset-entry {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 0.75rem !important;
            padding: 1.25rem !important;
            margin-bottom: 1rem !important;
            position: relative;
            transition: all 0.2s ease;
        }
        .formset-entry:hover {
            border-color: rgba(255, 255, 255, 0.1) !important;
            background: rgba(0, 0, 0, 0.25) !important;
        }
        
        /* For inline rows (skills, languages) which we don't want as big blocks */
        .formset-entry.flex {
            padding: 0.75rem 1rem !important;
            background: rgba(255, 255, 255, 0.02) !important;
            align-items: center;
        }
        .formset-entry.flex .form-row {
            margin-bottom: 0;
        }
        .formset-entry.flex button[onclick="removeForm(this)"] {
            position: static !important;
        }

        /* Professional ATS-Optimized Resume Preview Styling */
        .markdown-body {
            color: #000000;
            font-size: 11pt; /* Standard resume font size */
            line-height: 1.4;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: left;
        }
        .markdown-body h1 {
            font-size: 22pt;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin-top: 0;
            margin-bottom: 0.3rem;
            font-weight: 700;
            text-align: center;
            border: none;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Contact info under Name (usually paragraphs right under h1) */
        .markdown-body h1 + p {
            text-align: center;
            font-size: 10pt;
            margin-bottom: 1.2rem;
        }
        .markdown-body h2 {
            font-size: 12pt;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin-top: 1.2rem;
            margin-bottom: 0.6rem;
            font-weight: 700;
            border-bottom: 1px solid #000000;
            padding-bottom: 0.2rem;
            color: #000000;
            text-transform: uppercase;
        }
        .markdown-body h3 {
            font-size: 11pt;
            border-bottom: none;
            margin-top: 0.8rem;
            margin-bottom: 0.2rem;
        }
        .markdown-body ul {
            list-style-type: disc;
            padding-left: 1.2rem;
            margin-bottom: 0.8rem;
            margin-top: 0.3rem;
        }
        .markdown-body li { 
            margin-bottom: 0.25rem; 
            text-align: left;
        }
        .markdown-body p { 
            margin-bottom: 0.6rem; 
            margin-top: 0;
        }
        .markdown-body strong { 
            color: #000000; 
            font-weight: 700;
        }
        .markdown-body em {
            font-style: italic;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="antialiased min-h-screen flex flex-col relative print:bg-white print:text-black">
    
    <!-- Navbar -->
    <nav class="glass-nav fixed w-full z-50 top-0 transition-all duration-300 print:hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'home' %}" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-bold text-xl shadow-lg">R</div>
                    <span class="font-heading font-bold text-xl tracking-tight text-white">ResumeAI</span>
                </a>
                <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                    <a href="{% url 'create_resume' %}" class="text-textSecondary hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Create Resume</a>
                    <a href="{% url 'resume_list' %}" class="text-textSecondary hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">My Resumes</a>
                </div>
                <div class="flex items-center gap-4">
                    <!-- Mobile menu button -->
                    <div class="sm:hidden flex items-center">
                        <a href="{% url 'resume_list' %}" class="text-textSecondary hover:text-white px-3 py-2">Menu</a>
                    </div>
                    <div class="hidden sm:flex w-8 h-8 rounded-full bg-gray-800 border border-gray-700 items-center justify-center text-xs font-medium text-gray-300 shadow-inner">
                        U
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-[1200px] mx-auto w-full print:p-0 print:m-0 print:max-w-none print:bg-white print:text-black">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
