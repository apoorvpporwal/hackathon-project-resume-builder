<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ResumeAI{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0B0F19',
                        cardbg: 'rgba(255, 255, 255, 0.05)',
                        cardborder: 'rgba(255, 255, 255, 0.1)',
                        primary: '#6366F1',
                        secondary: '#8B5CF6',
                        textPrimary: '#E5E7EB',
                        textSecondary: '#9CA3AF',
                        success: '#22C55E',
                        warning: '#F59E0B',
                        error: '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F19;
            color: #E5E7EB;
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-nav {
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        /* Form inputs global */
        input[type="text"], input[type="email"], input[type="url"], input[type="number"], textarea, select {
            background-color: #1F2937;
            border: 1px solid #374151;
            color: #E5E7EB;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.2s ease-in-out;
            font-family: 'Inter', sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6366F1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .form-row { margin-bottom: 1.25rem; }
        .form-row label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #D1D5DB;
            font-size: 0.875rem;
        }
        /* Markdown Preview Styling (inside light containers) */
        .markdown-body {
            color: #1F2937;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #111827;
            font-family: 'Poppins', sans-serif;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            border-bottom: 1px solid #E5E7EB;
            padding-bottom: 0.3em;
        }
        .markdown-body h1 {font-size: 1.8rem;}
        .markdown-body h2 {font-size: 1.4rem;}
        .markdown-body h3 {font-size: 1.1rem; border-bottom: none;}
        .markdown-body ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1em;
        }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body p { margin-bottom: 1em; }
        .markdown-body strong { color: #111827; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="antialiased min-h-screen flex flex-col relative print:bg-white print:text-black">
    
    <!-- Navbar -->
    <nav class="glass-nav fixed w-full z-50 top-0 transition-all duration-300 print:hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'home' %}" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-bold text-xl shadow-lg">R</div>
                    <span class="font-heading font-bold text-xl tracking-tight text-white">ResumeAI</span>
                </a>
                <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                    <a href="{% url 'create_resume' %}" class="text-textSecondary hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Create Resume</a>
                    <a href="{% url 'resume_list' %}" class="text-textSecondary hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">My Resumes</a>
                </div>
                <div class="flex items-center gap-4">
                    <!-- Mobile menu button -->
                    <div class="sm:hidden flex items-center">
                        <a href="{% url 'resume_list' %}" class="text-textSecondary hover:text-white px-3 py-2">Menu</a>
                    </div>
                    <div class="hidden sm:flex w-8 h-8 rounded-full bg-gray-800 border border-gray-700 items-center justify-center text-xs font-medium text-gray-300 shadow-inner">
                        U
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-[1200px] mx-auto w-full print:p-0 print:m-0 print:max-w-none print:bg-white print:text-black">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
