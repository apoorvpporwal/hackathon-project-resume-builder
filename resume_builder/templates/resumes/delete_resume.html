{% extends 'base.html' %}

{% block title %}Delete Resume - ResumeAI{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-12 mb-24">
    <div class="glass-card rounded-2xl p-8 text-center border-t-4 border-t-error shadow-[0_0_40px_rgba(239,68,68,0.15)]">
        
        <div class="w-20 h-20 mx-auto bg-error/10 rounded-full flex items-center justify-center mb-6">
            <span class="text-4xl">⚠️</span>
        </div>
        
        <h2 class="text-3xl font-heading font-bold text-white mb-4">Delete Resume?</h2>
        
        <p class="text-gray-300 text-lg mb-8">
            Are you sure you want to permanently delete the resume for <br>
            <strong class="text-white font-semibold">"{{ resume.name }}"</strong>?<br>
            <span class="text-sm text-textSecondary mt-2 block">This action cannot be undone.</span>
        </p>

        <form method="post" class="flex flex-col sm:flex-row gap-4 justify-center">
            {% csrf_token %}
            <a href="{% url 'resume_list' %}" class="px-6 py-3 rounded-xl font-heading font-medium text-white bg-gray-800 hover:bg-gray-700 border border-gray-700 transition-colors w-full sm:w-auto">
                Cancel
            </a>
            <button type="submit" class="px-6 py-3 rounded-xl font-heading font-medium text-white bg-error hover:bg-red-600 transition-colors shadow-lg shadow-error/20 w-full sm:w-auto">
                Yes, Delete Resume
            </button>
        </form>
        
    </div>
</div>
{% endblock %}
